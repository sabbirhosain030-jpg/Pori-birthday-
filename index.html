<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শুভ জন্মদিন আমার পরী!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* তোমার ইমেজ লিংকটি নিচে দেওয়া হলো */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('https://raw.githubusercontent.com/sabbirhosain030-jpg/Pori-birthday-/main/1776375206684.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 85%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 { 
            color: #ffffff; 
            margin-bottom: 15px; 
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p { 
            color: #f8f9fa; 
            line-height: 1.7; 
            font-size: 1.1rem; 
            margin: 15px 0;
            font-weight: 300;
        }

        .nickname { 
            font-weight: 600; 
            color: #ffeb3b; 
            font-size: 1.6rem; 
            display: block; 
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
        }

        /* Fairy Wings Icon */
        .wings {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px gold);
        }

        /* Falling Snow/Magic Particles */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="wings">🧚‍♀️</div>
        <h1>শুভ জন্মদিন!</h1>
        <h2>ইয়াসমিন আক্তার অনু</h2>
        <p>মানুষ বলে পরীরা নাকি স্বর্গে থাকে, কিন্তু আমি জানি আমার পরীটা আমার পাশেই আছে। তোমার এক চিমটি হাসিতেই আমার পুরো পৃথিবীটা জাদুকরী হয়ে ওঠে।</p>
        <span class="nickname">আমার মিষ্টি পরী ❤️</span>
        <p style="font-size: 0.8rem; margin-top: 25px; color: #ddd; letter-spacing: 1px;">— ইতি, সাব্বির</p>
    </div>

    <script>
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.width = sparkle.style.height = Math.random() * 4 + 2 + 'px';
            sparkle.style.animationDuration = Math.random() * 3 + 4 + 's';
            sparkle.style.opacity = Math.random();
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 7000);
        }
        setInterval(createSparkle, 150);
    </script>
</body>
</html>
