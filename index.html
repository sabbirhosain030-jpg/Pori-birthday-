<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শুভ জন্মদিন আমার পরী!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        /* Floating Animation */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            position: relative;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
            border: 2px solid #fff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 { color: #ff4b2b; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; font-size: 1.1rem; }
        .nickname { font-weight: 600; color: #ff1493; font-size: 1.5rem; display: block; margin-top: 10px; }

        /* Wings Effect */
        .card::before, .card::after {
            content: '🧚‍♀️';
            position: absolute;
            font-size: 50px;
            top: -30px;
            opacity: 0.5;
        }
        .card::before { left: -20px; transform: rotate(-20deg); }
        .card::after { right: -20px; transform: rotate(20deg); }

        /* Background Sparkles */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: fly 5s linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>শুভ জন্মদিন! 🎂</h1>
        <h2>ইয়াসমিন আক্তার অনু</h2>
        <p>মানুষ বলে পরীরা নাকি স্বর্গে থাকে, কিন্তু আমি জানি আমার পরীটা আমার পাশেই আছে। তোমার হাসিতেই আমার পৃথিবী শান্ত হয়।</p>
        <span class="nickname">আমার মিষ্টি পরী ❤️</span>
        <p style="font-size: 0.9rem; margin-top: 20px; color: #888;">— তোমার প্রিয় মানুষটির কাছ থেকে</p>
    
    </div>

    <script>
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.width = sparkle.style.height = Math.random() * 5 + 5 + 'px';
            sparkle.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 5000);
        }
        setInterval(createSparkle, 150);
    </script>
</body>
</html>
